#全局配置
worker_processes  auto;   #工作进程数，auto表示根据CPU核心数自动设置
error_log  logs/error.log ;#错误日志路径
pid logs/nginx.pid ;#pid文件路径 存储主进程id

events {
    worker_connections  1024;  #每个工作进程的最大连接数
}

http {
    include       mime.types;   #引入mime类型映射表 用于告诉浏览器如何解析文件
    default_type  application/octet-stream;#兜底方案
    #日志格式配置
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;  #访问日志：记录所有的请求

    sendfile       on; # 启用零拷贝技术，加速静态文件传输
    tcp_nopush     on;      # 优化TCP传输，减少网络包数量
    tcp_nodelay    on;      # 禁用Nagle算法，降低实时数据延迟
    keepalive_timeout  65;  # 长连接超时时间：65秒
    # Gzip压缩（优化大屏加载速度）
    gzip on;  # 启用Gzip压缩
    gzip_vary on;   #告诉浏览器支持压缩，避免缓存问题
    gzip_min_length 1024;  #只有大于1KB的响应才压缩，避免小文件压缩反而增大
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    #文件压缩的类型
    # 服务器配置
    server {

        listen 80;
        server_name localhost;

        # ========== 前端静态资源服务 ==========
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            
            # 支持Vue Router的history模式
            try_files $uri $uri/ /index.html;
        } 
        # ========== FastAPI异步API ==========
        location /api/async/ {
            proxy_pass http://fastapi:8001/api/async/
        
        # FastAPI异步服务配置
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
        
        # 异步请求可能耗时更长
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
       }
        # ========== 后端API反向代理 ==========
        # 移除了 /api/ 内部的 WebSocket 升级配置，让普通 API 和长连接各司其职
        location /api/ {
            proxy_pass http://web:8000; 
            
            # 传递客户端真实IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
       
        
        # ========== WebSocket连接（实时监控） ==========
        location /ws/ {
            proxy_pass http://web:8000;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;  #websocket使用Upgrade头部进行协议升级
            proxy_set_header Connection "upgrade";
            
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;

            # 【核心优化】物联网长连接专属超时，防止大屏在无数据交互时断连（设为10分钟）
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # 错误页面
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root   html;
        }
    }
}