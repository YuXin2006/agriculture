# 全局配置
worker_processes  auto;   # 根据CPU核心数自动设置
error_log  /var/log/nginx/error.log warn; 
pid        /var/run/nginx.pid; # 统一使用标准绝对路径，避免Docker报错

events {
    worker_connections  1024;  # 每个工作进程的最大连接数
}

http {
    include       mime.types;   # 引入mime类型映射表
    default_type  application/octet-stream; # 兜底方案
    
    # 💡 修正：必须先定义 log_format，才能在 access_log 中使用 'main'
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # 💡 修正：合并为一个访问日志，使用绝对路径
    access_log  /var/log/nginx/access.log  main;

    sendfile        on; # 启用零拷贝技术
    tcp_nopush      on; # 优化TCP传输
    tcp_nodelay     on; # 禁用Nagle算法，降低实时数据延迟
    keepalive_timeout  65; # 长连接超时时间
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 服务器配置
    server {
        listen 80;
        server_name localhost;

        # ========== 前端静态资源服务 ==========
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            
            # 支持Vue/React Router的history模式
            try_files $uri $uri/ /index.html;
        } 

        # ========== FastAPI异步API ==========
        # 💡 优化：使用 ^~ 提高匹配优先级，防止被下面的 /api/ 误拦截
        location ^~ /api/async/ {
            proxy_pass http://fastapi:8001; # 规范化：去掉尾部重写路径，由后端自身路由处理
        
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        
            # 异步请求超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        } 

        # ========== 后端API反向代理 ==========
        location /api/ {
            proxy_pass http://web:8000; 
            
            proxy_http_version 1.1; # 💡 优化：后端代理也建议开启 http 1.1
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
       
        # ========== WebSocket连接（实时监控） ==========
        location /ws/ {
            proxy_pass http://web:8000;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; # 协议升级
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 物联网长连接专属超时（10分钟）
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # 错误页面
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root   /usr/share/nginx/html; # 💡 修正：建议与前端 root 保持目录风格一致
        }
    }
}